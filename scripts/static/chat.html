<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James's AI Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 16px; font-weight: 600; color: #fff; }
  header span { font-size: 12px; color: #555; }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .message { display: flex; flex-direction: column; gap: 6px; max-width: 780px; }
  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.assistant { align-self: flex-start; }
  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
  }
  .user .bubble {
    background: #1d4ed8;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .assistant .bubble {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-bottom-left-radius: 4px;
  }
  .meta {
    font-size: 11px;
    color: #444;
    padding: 0 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .engine-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .engine-badge.sql { background: #1e3a5f; color: #60a5fa; }
  .engine-badge.vector { background: #1e3a2a; color: #4ade80; }
  .raw-toggle {
    font-size: 11px;
    color: #444;
    cursor: pointer;
    text-decoration: underline;
  }
  .raw-content {
    font-size: 12px;
    color: #555;
    background: #111;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 10px 12px;
    font-family: monospace;
    display: none;
  }
  .thinking {
    display: flex;
    gap: 4px;
    padding: 14px 16px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .thinking span {
    width: 6px; height: 6px;
    background: #444;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); background: #666; }
  }
  #input-area {
    padding: 16px 24px;
    border-top: 1px solid #222;
    display: flex;
    gap: 10px;
  }
  #input {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 12px 16px;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  #input:focus { border-color: #1d4ed8; }
  #input::placeholder { color: #444; }
  #send {
    background: #1d4ed8;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #send:hover { background: #2563eb; }
  #send:disabled { background: #1a2a4a; color: #444; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <div class="status-dot"></div>
  <h1>James's AI Assistant</h1>
  <span>Gemma 3 4B · Private · Tailscale</span>
</header>
<div id="chat"></div>
<div id="input-area">
  <input id="input" type="text" placeholder="Ask about your applications, documents, or anything in your data..." />
  <button id="send">Send</button>
</div>
<script>
  const API_KEY = 'jachty';
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const send = document.getElementById('send');

  function appendMessage(role, content, engine, raw) {
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;
    msg.appendChild(bubble);
    if (role === 'assistant' && engine) {
      const meta = document.createElement('div');
      meta.className = 'meta';
      const badge = document.createElement('span');
      badge.className = `engine-badge ${engine}`;
      badge.textContent = engine === 'sql' ? 'SQL' : 'Vector';
      meta.appendChild(badge);
      if (raw) {
        const toggle = document.createElement('span');
        toggle.className = 'raw-toggle';
        toggle.textContent = 'show raw retrieval';
        const rawDiv = document.createElement('div');
        rawDiv.className = 'raw-content';
        rawDiv.textContent = raw;
        toggle.onclick = () => {
          const visible = rawDiv.style.display === 'block';
          rawDiv.style.display = visible ? 'none' : 'block';
          toggle.textContent = visible ? 'show raw retrieval' : 'hide raw retrieval';
        };
        meta.appendChild(toggle);
        msg.appendChild(meta);
        msg.appendChild(rawDiv);
      } else {
        msg.appendChild(meta);
      }
    }
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }

  function appendThinking() {
    const wrapper = document.createElement('div');
    wrapper.className = 'message assistant';
    wrapper.id = 'thinking';
    const dots = document.createElement('div');
    dots.className = 'thinking';
    dots.innerHTML = '<span></span><span></span><span></span>';
    wrapper.appendChild(dots);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeThinking() {
    const t = document.getElementById('thinking');
    if (t) t.remove();
  }

  async function sendQuery() {
    const question = input.value.trim();
    if (!question) return;
    input.value = '';
    send.disabled = true;
    appendMessage('user', question);
    appendThinking();
    try {
      const res = await fetch('/query', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY
        },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      removeThinking();
      appendMessage('assistant', data.answer, data.engine, data.raw);
    } catch (err) {
      removeThinking();
      appendMessage('assistant', 'Error reaching the server. Check that the API is running.');
    }
    send.disabled = false;
    input.focus();
  }

  send.addEventListener('click', sendQuery);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendQuery(); });
</script>
</body>
</html>
